<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 560" width="320" height="560">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>
    <clipPath id="roundedClip">
      <rect x="40" y="30" width="256" height="510" rx="16"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="320" height="560" fill="#E8ECF0"/>

  <!-- Dropdown card -->
  <rect x="40" y="30" width="256" height="510" rx="16" fill="#fff" filter="url(#dropShadow)"/>

  <!-- Profile Header (blue gradient bg) -->
  <rect x="40" y="30" width="256" height="145" rx="16" fill="#EBF4FF" clip-path="url(#roundedClip)"/>
  <rect x="40" y="145" width="256" height="30" fill="#EBF4FF"/>

  <!-- Avatar -->
  <circle cx="168" cy="85" r="30" fill="#4A90D9" stroke="#fff" stroke-width="3"/>
  <text x="168" y="95" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#fff">M</text>

  <!-- Name -->
  <text x="168" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#1B2A4A">Miguel Aban</text>

  <!-- Account badge -->
  <rect x="118" y="143" width="100" height="22" rx="11" fill="#DBEAFE"/>
  <text x="168" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#3B82F6">Shipper Account</text>

  <!-- Rating -->
  <text x="168" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#8892A5">&#x2B50; 0.0 &#x2022; 0 trips completed</text>

  <!-- Separator -->
  <line x1="52" y1="192" x2="284" y2="192" stroke="#E8ECF0" stroke-width="1"/>

  <!-- ==================== -->
  <!-- MY ACTIVITY (NEW!) -->
  <!-- ==================== -->

  <!-- Highlight annotation -->
  <rect x="48" y="199" width="240" height="42" rx="10" fill="none" stroke="#FF6B00" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="130" y="190" width="120" height="16" rx="4" fill="#FF6B00"/>
  <text x="190" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#fff">&#x2605; NEW ADDITION &#x2605;</text>

  <!-- My Activity row -->
  <rect x="52" y="203" width="232" height="36" rx="8" fill="#FFF7ED"/>
  <!-- Icon bg -->
  <rect x="60" y="209" width="24" height="24" rx="6" fill="#FED7AA"/>
  <!-- Clipboard icon (SVG paths) -->
  <g transform="translate(64, 213)" fill="none" stroke="#C2410C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 0.5h6M4 0.5a1.5 1.5 0 00-1.5 1.5v11a1.5 1.5 0 001.5 1.5h8a1.5 1.5 0 001.5-1.5V2A1.5 1.5 0 0012 0.5H4z"/>
    <line x1="4.5" y1="5.5" x2="11.5" y2="5.5"/>
    <line x1="4.5" y1="8.5" x2="11.5" y2="8.5"/>
    <line x1="4.5" y1="11.5" x2="8" y2="11.5"/>
  </g>
  <text x="92" y="225" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#9A3412">My Activity</text>
  <!-- Chevron -->
  <text x="270" y="226" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#C2410C">&#x203A;</text>

  <!-- ==================== -->
  <!-- Broker Dashboard -->
  <!-- ==================== -->
  <rect x="52" y="247" width="232" height="36" rx="8" fill="transparent"/>
  <rect x="60" y="253" width="24" height="24" rx="6" fill="#F3F4F6"/>
  <g transform="translate(65, 258)" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="5" cy="4" r="3"/>
    <circle cx="11" cy="4" r="3"/>
    <path d="M0 13c0-2.8 2.2-5 5-5 1.3 0 2.5.5 3.4 1.3"/>
    <path d="M7 13c0-2.8 2.2-5 5-5s5 2.2 5 5"/>
  </g>
  <text x="92" y="269" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#4B5563">Broker Dashboard</text>
  <text x="270" y="270" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF">&#x203A;</text>

  <!-- ==================== -->
  <!-- Edit Profile -->
  <!-- ==================== -->
  <rect x="52" y="289" width="232" height="36" rx="8" fill="transparent"/>
  <rect x="60" y="295" width="24" height="24" rx="6" fill="#F3F4F6"/>
  <g transform="translate(66, 300)" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6" cy="4" r="3.5"/>
    <path d="M0.5 14c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5"/>
  </g>
  <text x="92" y="311" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#4B5563">Edit Profile</text>
  <text x="270" y="312" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF">&#x203A;</text>

  <!-- ==================== -->
  <!-- Notifications -->
  <!-- ==================== -->
  <rect x="52" y="331" width="232" height="36" rx="8" fill="transparent"/>
  <rect x="60" y="337" width="24" height="24" rx="6" fill="#F3F4F6"/>
  <g transform="translate(65, 341)" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 14a2 2 0 01-4 0M2 9V6a5 5 0 0110 0v3l2 3H0l2-3z"/>
  </g>
  <text x="92" y="353" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#4B5563">Notifications</text>
  <text x="270" y="354" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF">&#x203A;</text>

  <!-- ==================== -->
  <!-- Dark Mode -->
  <!-- ==================== -->
  <rect x="52" y="373" width="232" height="36" rx="8" fill="transparent"/>
  <rect x="60" y="379" width="24" height="24" rx="6" fill="#F3F4F6"/>
  <g transform="translate(66, 384)" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12.3 7.3A6 6 0 114.7 1.7 4.5 4.5 0 0012.3 7.3z"/>
  </g>
  <text x="92" y="395" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#4B5563">Dark Mode</text>
  <!-- Toggle switch (off) -->
  <rect x="240" y="385" width="36" height="20" rx="10" fill="#D1D5DB"/>
  <circle cx="253" cy="395" r="8" fill="#fff"/>

  <!-- ==================== -->
  <!-- Help & Support -->
  <!-- ==================== -->
  <rect x="52" y="415" width="232" height="36" rx="8" fill="transparent"/>
  <rect x="60" y="421" width="24" height="24" rx="6" fill="#F3F4F6"/>
  <g transform="translate(65, 426)" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="7" cy="7" r="6.5"/>
    <path d="M4.5 4.5a2.5 2.5 0 014.6 1.3c0 1.7-2.6 2.2-2.6 2.2"/>
    <circle cx="7" cy="11.5" r="0.5" fill="#6B7280"/>
  </g>
  <text x="92" y="437" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#4B5563">Help &amp; Support</text>
  <text x="270" y="438" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF">&#x203A;</text>

  <!-- Separator before logout -->
  <line x1="52" y1="460" x2="284" y2="460" stroke="#E8ECF0" stroke-width="1"/>

  <!-- ==================== -->
  <!-- Logout -->
  <!-- ==================== -->
  <rect x="52" y="468" width="232" height="36" rx="8" fill="#FEF2F2"/>
  <rect x="60" y="474" width="24" height="24" rx="6" fill="#FEE2E2"/>
  <g transform="translate(65, 479)" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 0v7M3 2.5A5.5 5.5 0 1012 2.5"/>
  </g>
  <text x="92" y="491" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#EF4444">Logout</text>
</svg>
