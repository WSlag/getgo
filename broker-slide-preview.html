<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Broker Slide Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; font-family: 'Outfit', sans-serif; gap: 24px; }
h3 { color: #64748b; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>

<h3>Broker Slide — Desktop (900×320)</h3>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" style="border-radius:20px;box-shadow:0 8px 48px rgba(0,0,0,0.2);">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="35%" stop-color="#4f46e5"/>
      <stop offset="70%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="orb1" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.55)"/>
      <stop offset="55%" stop-color="rgba(79,70,229,0.22)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(8,145,178,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- BG -->
  <rect width="900" height="320" rx="20" fill="url(#bg)"/>

  <!-- Orb top-right -->
  <g transform="translate(730,-60) rotate(12)">
    <rect width="260" height="260" rx="52" fill="url(#orb1)" opacity="0.9"/>
  </g>

  <!-- Orb bottom-right -->
  <circle cx="858" cy="298" r="118" fill="url(#orb2)" opacity="0.6"/>

  <!-- Ambient glow top-left -->
  <ellipse cx="-15" cy="150" rx="220" ry="200" fill="rgba(255,255,255,0.055)"/>

  <!-- Icon tile -->
  <rect x="64" y="36" width="64" height="64" rx="14" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.32)" stroke-width="1"/>
  <!-- Person left -->
  <circle cx="86" cy="57" r="9" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M68 84c0-10 8-16 18-16s18 6 18 16" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Person right (faded) -->
  <circle cx="108" cy="55" r="7.5" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.8"/>
  <path d="M100 82c0-8 6-13 14-13" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Peso spark -->
  <circle cx="120" cy="43" r="9" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
  <text x="120" y="48" text-anchor="middle" fill="white" font-size="11" font-weight="800" font-family="Outfit,sans-serif">₱</text>

  <!-- Headline -->
  <text x="64" y="142" fill="white" font-size="52" font-weight="900" letter-spacing="-2" font-family="Outfit,sans-serif">Be a Broker</text>

  <!-- Subtext -->
  <text x="64" y="174" fill="rgba(255,255,255,0.88)" font-size="17" font-weight="400" font-family="Outfit,sans-serif">Refer deals, earn commission. Zero capital, unlimited income.</text>

  <!-- Pills -->
  <rect x="64" y="194" width="118" height="32" rx="16" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.38)" stroke-width="1"/>
  <text x="123" y="215" text-anchor="middle" fill="white" font-size="13" font-weight="600" font-family="Outfit,sans-serif">Commission</text>

  <rect x="192" y="194" width="122" height="32" rx="16" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.38)" stroke-width="1"/>
  <text x="253" y="215" text-anchor="middle" fill="white" font-size="13" font-weight="600" font-family="Outfit,sans-serif">Zero Capital</text>

  <rect x="324" y="194" width="140" height="32" rx="16" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.38)" stroke-width="1"/>
  <text x="394" y="215" text-anchor="middle" fill="white" font-size="13" font-weight="600" font-family="Outfit,sans-serif">Unlimited Earn</text>

  <!-- CTA Button -->
  <rect x="64" y="242" width="200" height="44" rx="22" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <text x="153" y="269" text-anchor="middle" fill="white" font-size="15" font-weight="700" font-family="Outfit,sans-serif">Activate Broker</text>
  <line x1="216" y1="264" x2="226" y2="264" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <polyline points="221,259 226,264 221,269" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left nav arrow -->
  <circle cx="36" cy="160" r="18" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <polyline points="40,154 33,160 40,166" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right nav arrow -->
  <circle cx="864" cy="160" r="18" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <polyline points="860,154 867,160 860,166" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 4 dot indicators, 4th active -->
  <circle cx="420" cy="306" r="4" fill="rgba(255,255,255,0.45)"/>
  <circle cx="434" cy="306" r="4" fill="rgba(255,255,255,0.45)"/>
  <circle cx="448" cy="306" r="4" fill="rgba(255,255,255,0.45)"/>
  <rect x="458" y="302" width="22" height="8" rx="4" fill="white"/>
</svg>

<h3>Mobile (390×210)</h3>
<svg xmlns="http://www.w3.org/2000/svg" width="390" height="210" viewBox="0 0 390 210" style="border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
  <defs>
    <linearGradient id="bgm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="35%" stop-color="#4f46e5"/>
      <stop offset="70%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="orb1m" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.5)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="orb2m" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(8,145,178,0.4)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <rect width="390" height="210" rx="16" fill="url(#bgm)"/>
  <g transform="translate(295,-30) rotate(12)"><rect width="160" height="160" rx="32" fill="url(#orb1m)" opacity="0.85"/></g>
  <circle cx="360" cy="190" r="80" fill="url(#orb2m)" opacity="0.6"/>
  <ellipse cx="-10" cy="105" rx="140" ry="120" fill="rgba(255,255,255,0.055)"/>

  <!-- Icon tile -->
  <rect x="48" y="22" width="38" height="38" rx="10" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.32)" stroke-width="1"/>
  <circle cx="60" cy="35" r="6" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M50 52c0-7 5-11 10-11s10 4 10 11" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="73" cy="34" r="5" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>

  <!-- Headline -->
  <text x="48" y="90" fill="white" font-size="24" font-weight="900" letter-spacing="-0.8" font-family="Outfit,sans-serif">Be a Broker</text>

  <!-- Subtext -->
  <text x="48" y="110" fill="rgba(255,255,255,0.88)" font-size="11" font-weight="400" font-family="Outfit,sans-serif">Refer deals, earn commission.</text>
  <text x="48" y="124" fill="rgba(255,255,255,0.88)" font-size="11" font-weight="400" font-family="Outfit,sans-serif">Zero capital, unlimited income.</text>

  <!-- Pills -->
  <rect x="48" y="136" width="86" height="24" rx="12" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <text x="91" y="152" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="Outfit,sans-serif">Commission</text>

  <rect x="142" y="136" width="90" height="24" rx="12" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <text x="187" y="152" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="Outfit,sans-serif">Zero Capital</text>

  <!-- CTA Button -->
  <rect x="48" y="168" width="148" height="32" rx="16" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <text x="114" y="188" text-anchor="middle" fill="white" font-size="12" font-weight="700" font-family="Outfit,sans-serif">Activate Broker</text>
  <line x1="168" y1="184" x2="175" y2="184" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polyline points="172,180 175,184 172,188" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Nav arrows -->
  <circle cx="22" cy="105" r="14" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <polyline points="25,100 19,105 25,110" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="368" cy="105" r="14" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <polyline points="365,100 371,105 365,110" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dots -->
  <circle cx="180" cy="200" r="3" fill="rgba(255,255,255,0.45)"/>
  <circle cx="190" cy="200" r="3" fill="rgba(255,255,255,0.45)"/>
  <circle cx="200" cy="200" r="3" fill="rgba(255,255,255,0.45)"/>
  <rect x="208" y="197" width="16" height="6" rx="3" fill="white"/>
</svg>

</body>
</html>
