    font-family="Arial, Helvetica, sans-serif"
    font-size="72"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="-1.5"
  >
    GetGo
  </text>

  <rect x="86" y="230" width="212" height="116" rx="14" fill="#FFFFFF" />
  <rect x="300" y="264" width="122" height="82" rx="14" fill="#FFFFFF" />
  <rect x="325" y="280" width="64" height="42" rx="8" fill="#FF8B50" />

  <circle cx="164" cy="370" r="34" fill="#FF6B35" />
  <circle cx="252" cy="370" r="34" fill="#FF6B35" />
  <circle cx="372" cy="370" r="34" fill="#FF6B35" />

  <circle cx="164" cy="370" r="18" fill="#FFFFFF" />
  <circle cx="252" cy="370" r="18" fill="#FFFFFF" />
  <circle cx="372" cy="370" r="18" fill="#FFFFFF" />
