<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">GetGo Logo Preview</title>
  <desc id="desc">Orange rounded-square logo with a white truck and the text GetGo.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9A56" />
      <stop offset="55%" stop-color="#FF6B35" />
      <stop offset="100%" stop-color="#FF5722" />
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="96" fill="url(#bg)" />

  <text
