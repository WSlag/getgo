<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="bidGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="callGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="sheetShadow" x="-10%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.24" />
    </filter>
    <filter id="softShadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="390" height="844" fill="#e5e7eb" />

  <!-- Browser top strip -->
  <rect x="0" y="0" width="390" height="112" fill="url(#browserGrad)" />
  <rect x="18" y="28" width="240" height="44" rx="22" fill="#fed7aa" opacity="0.65" />
  <text x="36" y="56" font-family="Arial, sans-serif" font-size="14" fill="#7c2d12">getgoph.com/?bl</text>

  <!-- Annotation -->
  <rect x="16" y="124" width="246" height="30" rx="15" fill="#fff7ed" stroke="#fdba74" />
  <text x="30" y="143" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#c2410c">
    Call button: centered + bigger
  </text>

  <!-- Bottom-sheet modal -->
  <rect x="12" y="156" width="366" height="672" rx="30" fill="url(#cardGrad)" filter="url(#sheetShadow)" />
  <rect x="165" y="164" width="60" height="7" rx="4" fill="#cbd5e1" />

  <!-- Header area -->
  <rect x="32" y="206" width="54" height="54" rx="15" fill="url(#browserGrad)" filter="url(#softShadow)" />
  <rect x="48" y="222" width="22" height="22" rx="6" fill="none" stroke="#ffffff" stroke-width="2" />
  <path d="M52 228 L59 224 L66 228 L66 236 L59 240 L52 236 Z" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" />

  <text x="100" y="225" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Chat with Janice Lyn</text>
  <text x="100" y="252" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Lagbas</text>
  <text x="100" y="281" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Isulan  -&gt;  Davao City</text>

  <!-- Close icon -->
  <path d="M343 214 L355 226 M355 214 L343 226" stroke="#475569" stroke-width="3" stroke-linecap="round" />

  <!-- Updated call button (centered and bigger: 44x44) -->
  <circle cx="195" cy="321" r="22" fill="url(#callGrad)" filter="url(#softShadow)" />
  <path
    d="M112 311.8c0.5-0.5 1.2-0.7 1.9-0.4l2.3 1c0.7 0.3 1 1 0.8 1.7l-0.7 2.2c1 1.9 2.6 3.5 4.5 4.5l2.2-0.7c0.7-0.2 1.4 0.1 1.7 0.8l1 2.3c0.3 0.7 0.1 1.4-0.4 1.9l-1.7 1.7c-0.6 0.6-1.4 0.8-2.2 0.6c-2.8-0.8-5.3-2.4-7.3-4.5c-2.1-2.1-3.7-4.5-4.5-7.3c-0.2-0.8 0-1.6 0.6-2.2z"
    fill="#ffffff"
    transform="translate(73 0)"
  />

  <!-- Listing summary card -->
  <rect x="30" y="350" width="330" height="188" rx="18" fill="#f1f5f9" />
  <text x="48" y="392" font-family="Arial, sans-serif" font-size="43" font-weight="700" fill="#0f172a">Cargo</text>
  <text x="48" y="425" font-family="Arial, sans-serif" font-size="28" fill="#475569">--- tons</text>

  <rect x="48" y="447" width="294" height="50" rx="17" fill="url(#bidGrad)" />
  <text x="195" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#ffffff">
    Bid: PHP 10,000
  </text>

  <rect x="48" y="513" width="294" height="50" rx="17" fill="#ffedd5" stroke="#fdba74" stroke-width="2" />
  <text x="195" y="546" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9a3412">
    Enter New Agreed Price
  </text>

  <!-- Empty conversation card -->
  <rect x="30" y="552" width="330" height="198" rx="18" fill="#f1f5f9" />
  <circle cx="195" cy="624" r="30" fill="#dbeafe" />
  <path d="M184 621 h18 a4 4 0 0 1 4 4 v10 a4 4 0 0 1 -4 4 h-9 l-6 6 v-6 h-3 a4 4 0 0 1 -4 -4 v-10 a4 4 0 0 1 4 -4 z" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round" />
  <text x="195" y="688" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">Start the conversation!</text>
  <text x="195" y="718" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">Send a message to Janice Lyn Lagbas</text>

  <!-- Input row -->
  <rect x="24" y="768" width="292" height="58" rx="16" fill="#ffffff" stroke="#f97316" stroke-width="3" />
  <text x="36" y="804" font-family="Arial, sans-serif" font-size="18" fill="#6b7280">Type a message...</text>
  <rect x="326" y="768" width="56" height="58" rx="16" fill="#fdba74" />
  <path d="M345 797 L365 789 L357 809 L353 800 Z" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round" />
</svg>
