<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="560" height="660" viewBox="0 0 560 660">
  <defs>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>

    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9A56"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>

    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9A56"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>

    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9A56"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>

    <filter id="cardShadow" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="16" flood-color="#f97316" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>

    <filter id="ctaShadow" x="-10%" y="-30%" width="120%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#f97316" flood-opacity="0.4"/>
    </filter>

    <clipPath id="logoClipAndroid">
      <rect x="48" y="60" width="32" height="32" rx="7"/>
    </clipPath>

    <clipPath id="logoClipIos">
      <rect x="312" y="60" width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <!-- Backdrop -->
  <rect width="560" height="660" fill="url(#screenBg)"/>
  <circle cx="520" cy="70" r="90" fill="#fb923c" opacity="0.08"/>
  <circle cx="40" cy="612" r="78" fill="#f97316" opacity="0.08"/>

  <!-- Labels -->
  <text x="148" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#374151">Android</text>
  <text x="412" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#374151">iOS</text>
  <line x1="280" y1="10" x2="280" y2="646" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 5"/>

  <!-- ANDROID CARD -->
  <g>
    <rect x="24" y="36" width="248" height="588" rx="26" fill="#ffffff" filter="url(#cardShadow)"/>
    <rect x="24" y="36" width="248" height="96" rx="26" fill="url(#headerGrad)"/>
    <rect x="24" y="106" width="248" height="26" fill="url(#headerGrad)"/>

    <!-- Header decoration -->
    <circle cx="248" cy="52" r="36" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="42" cy="122" r="28" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>

    <!-- Logo tile -->
    <rect x="40" y="52" width="48" height="48" rx="16" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.35"/>
    <image x="48" y="60" width="32" height="32" preserveAspectRatio="xMidYMid slice" href="/icons/icon-192x192.png" xlink:href="/icons/icon-192x192.png" clip-path="url(#logoClipAndroid)"/>

    <!-- Header text -->
    <text x="96" y="68" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" fill-opacity="0.76" letter-spacing="1.4">GETGO SECURE ACCESS</text>
    <path d="M96 75 L101 72 L106 75 L106 82 C106 86 102.8 89 101 90 C99.2 89 96 86 96 82 Z" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M99 80.4 L100.6 82 L103.4 79.2" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="112" y="88" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">External browser required</text>

    <!-- Body -->
    <text x="40" y="170" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#111827" letter-spacing="-0.2">Open in Google</text>

    <text x="40" y="195" font-family="Arial, sans-serif" font-size="11.5" fill="#6b7280">You are viewing GetGo in Facebook's built-in</text>
    <text x="40" y="212" font-family="Arial, sans-serif" font-size="11.5" fill="#6b7280">browser. For the best and most stable experience,</text>
    <text x="40" y="229" font-family="Arial, sans-serif" font-size="11.5" fill="#6b7280">continue in your phone's browser.</text>

    <!-- Android CTA -->
    <rect x="40" y="246" width="216" height="50" rx="16" fill="url(#ctaGrad)" filter="url(#ctaShadow)"/>
    <path d="M102 280 L119 263 M111.5 263 H119 V270.5" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="94" y="265" width="22" height="22" rx="4.5" fill="none" stroke="#ffffff" stroke-width="2.2"/>
    <text x="126" y="280" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Open in Google</text>

    <!-- Steps -->
    <rect x="40" y="314" width="216" height="220" rx="16" fill="#fff7ed" fill-opacity="0.6" stroke="#fed7aa"/>
    <text x="52" y="335" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#fb923c" letter-spacing="0.9">IF THE BUTTON DOES NOT WORK</text>

    <circle cx="66" cy="362" r="12" fill="url(#stepGrad)"/>
    <text x="66" y="366.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <circle cx="96" cy="354.5" r="2" fill="#fb923c"/>
    <circle cx="96" cy="361.5" r="2" fill="#fb923c"/>
    <circle cx="96" cy="368.5" r="2" fill="#fb923c"/>
    <text x="112" y="360" font-family="Arial, sans-serif" font-size="12.2" fill="#374151">Tap the three-dot menu in the</text>
    <text x="112" y="378" font-family="Arial, sans-serif" font-size="12.2" fill="#374151">top-right corner.</text>

    <circle cx="66" cy="414" r="12" fill="url(#stepGrad)"/>
    <text x="66" y="418.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">2</text>
    <text x="112" y="418" font-family="Arial, sans-serif" font-size="12.2" fill="#374151">Choose "Open in browser".</text>
  </g>

  <!-- IOS CARD -->
  <g>
    <rect x="288" y="36" width="248" height="588" rx="26" fill="#ffffff" filter="url(#cardShadow)"/>
    <rect x="288" y="36" width="248" height="96" rx="26" fill="url(#headerGrad)"/>
    <rect x="288" y="106" width="248" height="26" fill="url(#headerGrad)"/>

    <!-- Header decoration -->
    <circle cx="512" cy="52" r="36" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="306" cy="122" r="28" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>

    <!-- Logo tile -->
    <rect x="304" y="52" width="48" height="48" rx="16" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.35"/>
    <image x="312" y="60" width="32" height="32" preserveAspectRatio="xMidYMid slice" href="/icons/icon-192x192.png" xlink:href="/icons/icon-192x192.png" clip-path="url(#logoClipIos)"/>

    <!-- Header text -->
    <text x="360" y="68" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" fill-opacity="0.76" letter-spacing="1.4">GETGO SECURE ACCESS</text>
    <path d="M360 75 L365 72 L370 75 L370 82 C370 86 366.8 89 365 90 C363.2 89 360 86 360 82 Z" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M363 80.4 L364.6 82 L367.4 79.2" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="376" y="88" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">External browser required</text>

    <!-- Body -->
    <text x="304" y="170" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#111827" letter-spacing="-0.2">Open in Safari</text>

    <text x="304" y="195" font-family="Arial, sans-serif" font-size="11.5" fill="#6b7280">You are viewing GetGo in Facebook's built-in</text>
    <text x="304" y="212" font-family="Arial, sans-serif" font-size="11.5" fill="#6b7280">browser. For the best and most stable experience,</text>
    <text x="304" y="229" font-family="Arial, sans-serif" font-size="11.5" fill="#6b7280">continue in your phone's browser.</text>

    <!-- iOS CTA -->
    <rect x="304" y="246" width="216" height="50" rx="16" fill="url(#ctaGrad)" filter="url(#ctaShadow)"/>
    <rect x="339" y="264.5" width="15" height="19.5" rx="2.2" fill="none" stroke="#ffffff" stroke-width="2.1"/>
    <line x1="342.7" y1="269.8" x2="350.3" y2="269.8" stroke="#ffffff" stroke-width="2.1" stroke-linecap="round"/>
    <line x1="342.7" y1="274.6" x2="350.3" y2="274.6" stroke="#ffffff" stroke-width="2.1" stroke-linecap="round"/>
    <text x="425" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.4" font-weight="700" fill="#ffffff">Copy Link to Open in Safari</text>

    <!-- Steps -->
    <rect x="304" y="314" width="216" height="220" rx="16" fill="#fff7ed" fill-opacity="0.6" stroke="#fed7aa"/>
    <text x="316" y="335" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#fb923c" letter-spacing="0.9">MANUAL STEPS</text>

    <circle cx="330" cy="362" r="12" fill="url(#stepGrad)"/>
    <text x="330" y="366.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <circle cx="360" cy="354.5" r="2" fill="#fb923c"/>
    <circle cx="360" cy="361.5" r="2" fill="#fb923c"/>
    <circle cx="360" cy="368.5" r="2" fill="#fb923c"/>
    <text x="376" y="360" font-family="Arial, sans-serif" font-size="12.2" fill="#374151">Tap the menu button at the</text>
    <text x="376" y="378" font-family="Arial, sans-serif" font-size="12.2" fill="#374151">bottom of Facebook.</text>

    <circle cx="330" cy="414" r="12" fill="url(#stepGrad)"/>
    <text x="330" y="418.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">2</text>
    <text x="376" y="418" font-family="Arial, sans-serif" font-size="12.2" fill="#374151">Select "Open in Safari".</text>
  </g>
</svg>
